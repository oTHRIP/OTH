<script>
    async function loadImagesSimple(folderPath, containerId, dotsContainerId, maxImages = 10) {
        const container = document.getElementById(containerId);
        const dotsContainer = document.getElementById(dotsContainerId);
        
        if (!container || !dotsContainer) return;

        container.innerHTML = '';
        dotsContainer.innerHTML = '';

        let loadedImages = [];asdas

        for (let i = 1; i <= maxImages; i++) {
            const imgUrl = `${folderPath}${i}.png`;

            const exists = await new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = imgUrl;
            });

            if (exists) {
                const img = document.createElement('img');
                img.src = imgUrl;
                img.alt = `Imagem ${i}`;
                container.appendChild(img);
                loadedImages.push(imgUrl);
            } else {
                break;
            }
        }

        // dots
        loadedImages.forEach(() => {
            const dot = document.createElement('span');
            dot.className = 'dot';
            dotsContainer.appendChild(dot);
        });

        // animação
        if (loadedImages.length > 1) {
            const duration = loadedImages.length * 4;
            container.style.animation = `slideSlow ${duration}s infinite ease-in-out`;
        } else {
            container.style.animation = 'none';
        }

        // fallback
        if (loadedImages.length === 0) {
            container.innerHTML = '<p style="padding:20px">Nenhuma imagem encontrada</p>';
        }
    }

    // MODAL
    const modal = document.getElementById('contactModal');
    const contactBtn = document.getElementById('contactBtn');
    const closeModal = document.querySelector('.close-modal');
    const toast = document.getElementById('toastMessage');

    contactBtn.onclick = () => modal.style.display = 'flex';
    closeModal.onclick = () => modal.style.display = 'none';

    window.onclick = (e) => {
        if (e.target === modal) modal.style.display = 'none';
    };

    function showToast(msg) {
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 3000);
    }

    // FORM
    const contactForm = document.getElementById('contactForm');

    contactForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = userName.value;
        const email = userEmail.value;
        const message = userMessage.value;

        const formData = new FormData();
        formData.append('name', name);
        formData.append('email', email);
        formData.append('message', message);

        try {
            const res = await fetch('https://formsubmit.co/ajax/Henthaliss@gmail.com', {
                method: 'POST',
                body: formData
            });

            if (res.ok) {
                showToast('✅ Mensagem enviada!');
                contactForm.reset();
                modal.style.display = 'none';
            } else throw new Error();
        } catch {
            showToast('Erro ao enviar 😢');
        }
    });

    // LOAD DAS IMAGENS
    window.addEventListener('DOMContentLoaded', () => {
        loadImagesSimple('imagens/friendchat', 'friendChatImages', 'friendChatDots', 10);
        loadImagesSimple('imagens/model', 'modelsImages', 'modelsDots', 10);
    });
</script>
